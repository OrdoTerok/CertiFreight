spring:
  application:
    name: certifreight-backend

  # Database Connection Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/certifreight
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Configurations
  jpa:
    hibernate:
      # None means Hibernate won't alter tables automatically.
      # Flyway will handle our database schemas explicitly.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # Database Migration Lifecycle Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Observability Metrics (Actuator Endpoints)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

# Logging Configuration
logging:
  level:
    org.flywaydb: DEBUG

# Application Security Rules
app:
  jwt:
    secret: c3VwZXItc2VjcmV0LWVudGVycHJpc2UtY2VydGlmcmVpZ2h0LXNpZ25pbmcta2V5LXN0cmluZw==
    expiration-ms: 86400000